<p-toast></p-toast>

<div class="container">

  <h2>CRUD Usuarios</h2>

  <button pButton 
          label="Nuevo Usuario"
          icon="pi pi-plus"
          (click)="openNew()">
  </button>

  <p-table [value]="users" class="mt-3">

    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Edad</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.nombre }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.telefono }}</td>
        <td>{{ user.edad }}</td>
        <td>
          <button pButton 
                  icon="pi pi-pencil"
                  severity="info"
                  (click)="editUser(user)">
          </button>

          <button pButton 
                  icon="pi pi-trash"
                  severity="danger"
                  (click)="deleteUser(user)">
          </button>
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<!-- Dialog -->
<p-dialog header="Usuario"
          [(visible)]="displayDialog"
          [modal]="true"
          [style]="{width: '400px'}">

  <div class="field">
    <label>Nombre</label>
    <input pInputText [(ngModel)]="user.nombre" />
  </div>

  <div class="field">
    <label>Email</label>
    <input pInputText [(ngModel)]="user.email" />
  </div>

  <div class="field">
    <label>Teléfono</label>
    <input pInputText [(ngModel)]="user.telefono" />
  </div>

  <div class="field">
    <label>Edad</label>
    <input pInputText [(ngModel)]="user.edad" />
  </div>

  <button pButton 
          label="Guardar"
          (click)="saveUser()">
  </button>

</p-dialog>
