<div class="container">

  <h2>Registro</h2>

  <form [formGroup]="registerForm" (ngSubmit)="register()">

    <input pInputText formControlName="usuario" placeholder="Usuario" />
    <input pInputText formControlName="email" placeholder="Email" />
    <input pInputText formControlName="nombreCompleto" placeholder="Nombre completo" />
    <input pInputText formControlName="direccion" placeholder="Dirección" />
    <input pInputText formControlName="telefono" placeholder="Teléfono" />
    <input pInputText formControlName="edad" placeholder="Edad" />

    <input pPassword formControlName="password" placeholder="Contraseña" />
    <input pPassword formControlName="confirmPassword" placeholder="Confirmar contraseña" />

    <p-button 
      label="Registrarse"
      type="submit"
      [disabled]="registerForm.invalid">
    </p-button>

  </form>

</div>
