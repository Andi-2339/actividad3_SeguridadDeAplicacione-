<div class="container">

  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="login()">

    <input pInputText 
           formControlName="email" 
           placeholder="Email" />

    <input pPassword 
           formControlName="password" 
           placeholder="Password" />

    <p-button 
      label="Ingresar"
      type="submit"
      [disabled]="loginForm.invalid">
    </p-button>

  </form>

</div>
