<p-toast></p-toast>

<div class="container">

  <h2>CRUD Groups</h2>

  <button pButton 
          label="Nuevo Grupo"
          icon="pi pi-plus"
          (click)="openNew()">
  </button>

  <p-table [value]="groups" class="mt-3">

    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Categoria</th>
        <th>Nivel</th>
        <th>Autor</th>
        <th>Miembros</th>
        <th>Tickets</th>
        <th>Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-group>
      <tr>
        <td>{{ group.id }}</td>
        <td>{{ group.nombre }}</td>
        <td>{{ group.categoria }}</td>
        <td>{{ group.nivel }}</td>
        <td>{{ group.autor }}</td>
        <td>{{ group.miembros }}</td>
        <td>{{ group.tickets }}</td>
        <td>
          <button pButton 
                  icon="pi pi-pencil"
                  severity="info"
                  (click)="editGroup(group)">
          </button>

          <button pButton 
                  icon="pi pi-trash"
                  severity="danger"
                  (click)="deleteGroup(group)">
          </button>
        </td>
      </tr>
    </ng-template>

  </p-table>

</div>

<!-- Dialog -->
<p-dialog header="Grupo"
          [(visible)]="displayDialog"
          [modal]="true"
          [style]="{width: '400px'}">

  <div class="field">
    <label>Nombre</label>
    <input pInputText [(ngModel)]="group.nombre" />
  </div>

  <div class="field">
    <label>Categoria</label>
    <input pInputText [(ngModel)]="group.categoria" />
  </div>

  <div class="field">
    <label>Nivel</label>
    <input pInputText [(ngModel)]="group.nivel" />
  </div>

  <div class="field">
    <label>Autor</label>
    <input pInputText [(ngModel)]="group.autor" />
  </div>

  <div class="field">
    <label>Miembros</label>
    <input pInputText [(ngModel)]="group.miembros" />
  </div>

  <div class="field">
    <label>Tickets</label>
    <input pInputText [(ngModel)]="group.tickets" />
  </div>

  <button pButton 
          label="Guardar"
          (click)="saveGroup()">
  </button>

</p-dialog>
